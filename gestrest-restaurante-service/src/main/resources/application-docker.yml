spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/gestrest-ms
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

jwt:
  secret: ${JWT_SECRET:gestrest-secret-key-for-jwt-tokens-very-long-and-secure}