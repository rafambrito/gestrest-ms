version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: gestrest-db
    restart: always
    environment:
      POSTGRES_DB: gestrest
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - fiap

  app:
    build: .
    image: gestrest/api:1.0.0
    container_name: gestrest-restaurante-service
    restart: always
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gestrest
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
    networks:
      - fiap

networks:
  fiap:

volumes:
  postgres_data: