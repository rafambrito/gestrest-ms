services:
  postgres:
    image: postgres:16
    container_name: gestrest-postgres
    restart: always
    environment:
      POSTGRES_DB: gestrest-ms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - fase3net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: gestrest-zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - fase3net

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: gestrest-kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - fase3net

  auth-service:
    build:
      context: ./gestrest-auth-service
      dockerfile: Dockerfile
    image: gestrest/auth-service:1.0.0
    container_name: gestrest-auth-service
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gestrest-ms
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: gestrest-secret-key-for-jwt-tokens-very-long-and-secure
    networks:
      - fase3net

  restaurante-service:
    build:
      context: ./gestrest-restaurante-service
      dockerfile: Dockerfile
    image: gestrest/restaurante-service:1.0.0
    container_name: gestrest-restaurante-service
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8082:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gestrest-ms
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: gestrest-secret-key-for-jwt-tokens-very-long-and-secure
    networks:
      - fase3net

  pedido-service:
    build:
      context: ./gestrest-pedido-service
      dockerfile: Dockerfile
    image: gestrest/pedido-service:1.0.0
    container_name: gestrest-pedido-service
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8083:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gestrest-ms
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: gestrest-secret-key-for-jwt-tokens-very-long-and-secure
    networks:
      - fase3net

  pagamento-service:
    build:
      context: ./gestrest-pagamento-service
      dockerfile: Dockerfile
    image: gestrest/pagamento-service:1.0.0
    container_name: gestrest-pagamento-service
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      procpag:
        condition: service_started
    ports:
      - "8084:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gestrest-ms
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: gestrest-secret-key-for-jwt-tokens-very-long-and-secure
    networks:
      - fase3net

  procpag:
    image: docker.io/erickemprobr/procpag:latest
    container_name: gestrest-procpag
    platform: linux/amd64
    restart: always
    ports:
      - "8089:8089"
    networks:
      - fase3net

networks:
  fase3net:
    driver: bridge

volumes:
  postgres_data:
    driver: local

